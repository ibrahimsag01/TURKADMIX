        function createItem(index, innerHTML) {
            const el = document.createElement('div'); el.className = 'item';
            const card = document.createElement('div'); card.className = 'card'; card.innerHTML = innerHTML; el.appendChild(card);
            items.push({ el, type: 'card', x: 0, y: 0, rot: 0, baseZ: -index * CONFIG.zGap });

        function calculateTrueVahaduo(coordA, coordB) {
            let sum = 0;
            for (let i = 0; i < 25; i++) sum += Math.pow((coordA[i] - coordB[i]), 2);
            return Math.sqrt(sum);
        }

        // VAHADUO MULTI / SOURCE MODELLEME (NNLS): ağırlıklar >=0, toplam=1, Öklid uzaklığını minimize et
        function modelAdmixture(target, sources) {
            const n = sources.length;
            let w = new Array(n).fill(1 / n);
            const dist = (weights) => {
                let sum = 0;
                for (let d = 0; d < 25; d++) {
                    let mixed = 0;
                    for (let i = 0; i < n; i++) mixed += weights[i] * sources[i].coords[d];
                    const diff = target[d] - mixed; sum += diff * diff;
                }
                return Math.sqrt(sum);
            };
            let step = 0.5, best = dist(w); const EPS = 1e-12;
            while (step > 1e-7) {
                let improved = false;
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        if (i === j) continue;
                        if (w[i] < step) break;
                        w[i] -= step; w[j] += step;
                        const d = dist(w);
                        if (d < best - EPS) { best = d; improved = true; }
                        else { w[i] += step; w[j] -= step; }
                    }
                }
                if (!improved) step *= 0.5;
            }
            return { weights: w, distance: best };
        }

        // 2-YÖNLÜ (İKİLİ) MODEL: A ve B kaynağı için optimal karışım oranını analitik çöz
        function twoWayFit(target, A, B) {
            let num = 0, den = 0;
            for (let d = 0; d < 25; d++) { const ab = A[d] - B[d]; num += (target[d] - B[d]) * ab; den += ab * ab; }
            let w = den > 0 ? num / den : 0;
            if (w < 0) w = 0; if (w > 1) w = 1;
            let s = 0;
            for (let d = 0; d < 25; d++) { const m = w * A[d] + (1 - w) * B[d]; const diff = target[d] - m; s += diff * diff; }
            return { wa: w, wb: 1 - w, fit: Math.sqrt(s) };
        }

        // 3-YÖNLÜ (ÜÇLÜ) MODEL: A,B,C için kısıtlı en küçük kareler (wa+wb+wc=1, w>=0)
        function threeWayFit(target, A, B, C) {
            let uu = 0, uv = 0, vv = 0, ud = 0, vd = 0;
            for (let i = 0; i < 25; i++) { const u = A[i] - C[i], v = B[i] - C[i], d = target[i] - C[i]; uu += u * u; uv += u * v; vv += v * v; ud += u * d; vd += v * d; }
            const det = uu * vv - uv * uv;
            let wa = 0, wb = 0;
            if (Math.abs(det) > 1e-18) { wa = (ud * vv - vd * uv) / det; wb = (vd * uu - ud * uv) / det; }
            let wc = 1 - wa - wb;
            if (wa >= 0 && wb >= 0 && wc >= 0) {
                let s = 0;
                for (let i = 0; i < 25; i++) { const m = wa * A[i] + wb * B[i] + wc * C[i]; const diff = target[i] - m; s += diff * diff; }
                return { wa, wb, wc, fit: Math.sqrt(s) };
            }
            // Sınır çözümü: üç ikili kombinasyonun en iyisi
            let f, best = null;
            f = twoWayFit(target, A, B); const r1 = { wa: f.wa, wb: f.wb, wc: 0, fit: f.fit };
            f = twoWayFit(target, A, C); const r2 = { wa: f.wa, wb: 0, wc: f.wb, fit: f.fit };
            f = twoWayFit(target, B, C); const r3 = { wa: 0, wb: f.wa, wc: f.wb, fit: f.fit };
            [r1, r2, r3].forEach(r => { if (!best || r.fit < best.fit) best = r; });
            return best;
        }

        let lastUserCoords = null;

        function getActiveSourceIndices() {
            const excL = document.getElementById('exc_levant') && document.getElementById('exc_levant').checked;
            const excK = document.getElementById('exc_kafkas') && document.getElementById('exc_kafkas').checked;
            return SOURCE_POPULATIONS.map((s, i) => i).filter(i => !(excL && i === 5) && !(excK && i === 4));
        }

        // MİRAS MODELLEMESİ + HARİTA (aktif kaynaklarla; dışlama kutucukları dikkate alınır)
        function runAdmixture(userCoords) {
            const activeIdx = getActiveSourceIndices();
            const activeSources = activeIdx.map(i => SOURCE_POPULATIONS[i]);
            const model = modelAdmixture(userCoords, activeSources);
            const pctByIdx = {};
            activeIdx.forEach((srcIdx, k) => { pctByIdx[srcIdx] = model.weights[k] * 100; });
            SOURCE_POPULATIONS.forEach((src, idx) => {
                const excluded = pctByIdx[idx] === undefined;
                const pct = excluded ? 0 : pctByIdx[idx];
                const valEl = document.getElementById(`h_val_${idx}`);
                const barEl = document.getElementById(`h_bar_${idx}`);
                valEl.innerText = excluded ? 'DIŞLANDI' : `%${pct.toFixed(1)}`;
                valEl.style.color = excluded ? '#555' : '';
                barEl.style.width = excluded ? '0%' : pct.toFixed(2) + '%';
            });
            document.getElementById('h_fit').innerText = `FIT DISTANCE: ${(model.distance * 100).toFixed(4)}%`;

            // Harita düğümleri (dışlananlar gizlenir)
            SOURCE_POPULATIONS.forEach((src, idx) => {
                const c = document.getElementById(`hc_${idx}`);
                const pct = pctByIdx[idx];
                if (pct === undefined) { c.setAttribute('r', '0'); c.style.opacity = '0'; }
                else { c.setAttribute('r', (5 + (pct / 100) * 30).toFixed(1)); c.style.opacity = pct < 0.05 ? '0.15' : (0.5 + (pct / 100) * 0.5).toFixed(2); }
            });
            // Legend: en YÜKSEK miras → en DÜŞÜK miras
            let legendData = activeIdx.map(idx => ({ idx, name: SOURCE_POPULATIONS[idx].name, pct: pctByIdx[idx] }));
            legendData.sort((a, b) => b.pct - a.pct);
            document.getElementById('map_legend').innerHTML = legendData.map(d => `<div class="leg-row"><span class="leg-ico" style="background:${COLORS[d.idx]};color:${COLORS[d.idx]}"></span><span class="leg-name">${d.name}</span><span class="leg-pct">%${d.pct.toFixed(1)}</span></div>`).join('');
            const top = legendData[0] || { name: '', pct: 0 };
            document.getElementById('map-status').innerText = `DOMINANT: ${top.name.toUpperCase()} %${top.pct.toFixed(1)}`;
        }

        function onExcludeChange() { if (lastUserCoords) runAdmixture(lastUserCoords); }

        function executeGeneticPipeline() {
            const raw = document.getElementById('coordInput').value;
            const chunks = raw.split(',');
            if (chunks.length < 26) { alert('HATA: Geçerli bir 25 boyutlu G25 koordinat seti bulunamadı!'); return; }
            const userCoords = chunks.slice(1, 26).map(Number);

            // 1. Tekil uzaklıklar (Kart 4 - genetik uzaklık)
            let distances = POPULATION_DATABASE.map(pop => ({ name: pop.name, distance: calculateTrueVahaduo(userCoords, pop.coords) }));
            distances.sort((a, b) => a.distance - b.distance);

            // 2 & 3. MİRAS MODELLEMESİ + HARİTA (dışlama kutucukları dikkate alınır, legend yüksekten düşüğe)
            lastUserCoords = userCoords;
            runAdmixture(userCoords);

            // 4. Genetik uzaklık listesi (en yakın 5)
            const output = document.getElementById('distance_output_node');
            output.innerHTML = '';
            distances.slice(0, 5).forEach((d) => {
                const barWidth = Math.max(5, 100 - (d.distance * 2000));
                output.innerHTML += `
                    <div class="dist-item">
                        <div style="display:flex; justify-content:space-between;"><span>${d.name}</span><span style="color:var(--accent); font-weight:bold;">${d.distance.toFixed(4)}</span></div>
                        <div class="hud-bar-bg"><div class="dist-bar-fill" style="width: ${barWidth}%"></div></div>
                    </div>`;
            });

            // 5. 2-YÖNLÜ MODELLEME: tüm DB'den her ikili kombinasyon, en düşük fitli 3'ü
            const pops = POPULATION_DATABASE;
            let pairs = [];
            for (let a = 0; a < pops.length; a++) {
                for (let b = a + 1; b < pops.length; b++) {
                    const r = twoWayFit(userCoords, pops[a].coords, pops[b].coords);
                    pairs.push({ a: pops[a].name, b: pops[b].name, wa: r.wa, wb: r.wb, fit: r.fit });
                }
            }
            pairs.sort((x, y) => x.fit - y.fit);
            const pairNode = document.getElementById('pair_output_node');
            pairNode.innerHTML = '';
            pairs.slice(0, 3).forEach((p, i) => {
                pairNode.innerHTML += `
                    <div class="pair-item">
                        <div style="display:flex; justify-content:space-between;"><span class="pair-rank">#${i + 1}</span><span class="pair-fit">FIT: ${(p.fit * 100).toFixed(4)}%</span></div>
                        <div class="pair-row"><span>${p.a}</span><span>%${(p.wa * 100).toFixed(1)}</span></div>
                        <div class="pair-row"><span>${p.b}</span><span>%${(p.wb * 100).toFixed(1)}</span></div>
                    </div>`;
            });
            document.getElementById('pair-status').innerText = `${pairs.length} KOMBİNASYON TARANDI`;

            // 6. 3-YÖNLÜ MODELLEME: tüm DB'den her üçlü kombinasyon, en düşük fitli 3'ü
            let triples = [];
            for (let a = 0; a < pops.length; a++) {
                for (let b = a + 1; b < pops.length; b++) {
                    for (let c = b + 1; c < pops.length; c++) {
                        const r = threeWayFit(userCoords, pops[a].coords, pops[b].coords, pops[c].coords);
                        triples.push({ a: pops[a].name, b: pops[b].name, c: pops[c].name, wa: r.wa, wb: r.wb, wc: r.wc, fit: r.fit });
                    }
                }
            }
            triples.sort((x, y) => x.fit - y.fit);
            const triNode = document.getElementById('pair3_output_node');
            triNode.innerHTML = '';
            triples.slice(0, 3).forEach((p, i) => {
                triNode.innerHTML += `
                    <div class="pair-item">
                        <div style="display:flex; justify-content:space-between;"><span class="pair-rank">#${i + 1}</span><span class="pair-fit">FIT: ${(p.fit * 100).toFixed(4)}%</span></div>
                        <div class="pair-row"><span>${p.a}</span><span>%${(p.wa * 100).toFixed(1)}</span></div>
                        <div class="pair-row"><span>${p.b}</span><span>%${(p.wb * 100).toFixed(1)}</span></div>
                        <div class="pair-row"><span>${p.c}</span><span>%${(p.wc * 100).toFixed(1)}</span></div>
                    </div>`;
            });
            document.getElementById('pair3-status').innerText = `${triples.length} ÜÇLÜ TARANDI`;

            // 7. AVCI-TOPLAYICI / ÇİFTÇİ (2-yönlü referans)
            const hgf = twoWayFit(userCoords, HG_FARMER[0].coords, HG_FARMER[1].coords);
            const hgfVals = [{ n: HG_FARMER[0].name, p: hgf.wa * 100 }, { n: HG_FARMER[1].name, p: hgf.wb * 100 }];
            document.getElementById('hgf_output').innerHTML = hgfVals.map(v => `<div class="heritage-item" style="margin-bottom:14px;"><div class="heritage-meta"><span>${v.n}</span><span>%${v.p.toFixed(1)}</span></div><div class="hud-bar-bg" style="height:10px;"><div class="hud-bar-fill" style="width:${v.p.toFixed(2)}%"></div></div></div>`).join('');
            document.getElementById('hgf-status').innerText = `FIT: ${(hgf.fit * 100).toFixed(4)}%`;

            // 8. ANTİK POPÜLASYONLAR (sadece bu kart)
            let anc = ANCIENT_POPULATIONS.map(p => ({ name: p.name, distance: calculateTrueVahaduo(userCoords, p.coords) }));
            anc.sort((a, b) => a.distance - b.distance);
            document.getElementById('ancient_output').innerHTML = anc.map((d, i) => `<div class="anc-item"><div style="display:flex;justify-content:space-between;"><span>${i === 0 ? '▶ ' : ''}${d.name}</span><span style="color:${i === 0 ? 'var(--neon-green)' : 'var(--accent)'};font-weight:bold;">${d.distance.toFixed(4)}</span></div><div class="hud-bar-bg"><div class="dist-bar-fill" style="width:${Math.max(4, 100 - (d.distance * 1800))}%"></div></div></div>`).join('');

            // 9. PCA KÜMELENME (G25 PC1 × PC2) — referans kümeler belirgin işaretli
            const PCA_REFS = {
                'Turkish_Aydin': { lbl: 'AYDIN TÜRKÜ', col: '#00f3ff' },
                'Azerbaijani_Turkey': { lbl: 'AZERBAYCAN TÜRKÜ', col: '#ffd400' },
                'Kurd_Kurmanji_Turkey': { lbl: 'KÜRT', col: '#b066ff' }
            };
            const pcaPts = POPULATION_DATABASE.map(p => ({ x: p.coords[0], y: p.coords[1], me: false, name: p.name }));
            pcaPts.push({ x: userCoords[0], y: userCoords[1], me: true, name: 'SEN' });
            const xs = pcaPts.map(p => p.x), ys = pcaPts.map(p => p.y);
            const xmin = Math.min(...xs), xmax = Math.max(...xs), ymin = Math.min(...ys), ymax = Math.max(...ys);
            const sx = v => 30 + ((v - xmin) / (xmax - xmin || 1)) * 340;
            const sy = v => 250 - ((v - ymin) / (ymax - ymin || 1)) * 220;
            document.getElementById('pca_svg').innerHTML = pcaPts.map(p => {
                const X = sx(p.x).toFixed(1), Y = sy(p.y).toFixed(1);
                if (p.me) return `<circle cx="${X}" cy="${Y}" r="6" class="pca-input"/><text x="${(+X + 9).toFixed(1)}" y="${(+Y + 4).toFixed(1)}" fill="#fff" font-family="monospace" font-size="12" font-weight="bold">SEN</text>`;
                const ref = PCA_REFS[p.name];
                if (ref) return `<circle cx="${X}" cy="${Y}" r="5" fill="${ref.col}" stroke="#000" stroke-width="0.6"/><text x="${(+X + 7).toFixed(1)}" y="${(+Y + 3).toFixed(1)}" fill="${ref.col}" font-family="monospace" font-size="9" font-weight="bold">${ref.lbl}</text>`;
                return `<circle cx="${X}" cy="${Y}" r="2.5" class="pca-dot"/>`;
            }).join('');
            document.getElementById('pca-status').innerText = `${POPULATION_DATABASE.length} POP + INPUT — REF: AYDIN / AZERBAYCAN / KÜRT`;

            // 10. ANTİK 2-YÖNLÜ MODEL (antik havuzdan en düşük fitli 3 ikili)
            const aps = ANCIENT_POPULATIONS;
            let aPairs = [];
            for (let a = 0; a < aps.length; a++) for (let b = a + 1; b < aps.length; b++) { const r = twoWayFit(userCoords, aps[a].coords, aps[b].coords); aPairs.push({ a: aps[a].name, b: aps[b].name, wa: r.wa, wb: r.wb, fit: r.fit }); }
            aPairs.sort((x, y) => x.fit - y.fit);
            document.getElementById('anc_pair_node').innerHTML = aPairs.slice(0, 3).map((p, i) => `<div class="pair-item"><div style="display:flex;justify-content:space-between;"><span class="pair-rank">#${i + 1}</span><span class="pair-fit">FIT: ${(p.fit * 100).toFixed(4)}%</span></div><div class="pair-row"><span>${p.a}</span><span>%${(p.wa * 100).toFixed(1)}</span></div><div class="pair-row"><span>${p.b}</span><span>%${(p.wb * 100).toFixed(1)}</span></div></div>`).join('');
            document.getElementById('anc-pair-status').innerText = `${aPairs.length} ANTİK İKİLİ TARANDI`;

            // 11. ANTİK 3-YÖNLÜ MODEL (antik havuzdan en düşük fitli 3 üçlü)
            let aTri = [];
            for (let a = 0; a < aps.length; a++) for (let b = a + 1; b < aps.length; b++) for (let c = b + 1; c < aps.length; c++) { const r = threeWayFit(userCoords, aps[a].coords, aps[b].coords, aps[c].coords); aTri.push({ a: aps[a].name, b: aps[b].name, c: aps[c].name, wa: r.wa, wb: r.wb, wc: r.wc, fit: r.fit }); }
            aTri.sort((x, y) => x.fit - y.fit);
            document.getElementById('anc_tri_node').innerHTML = aTri.slice(0, 3).map((p, i) => `<div class="pair-item"><div style="display:flex;justify-content:space-between;"><span class="pair-rank">#${i + 1}</span><span class="pair-fit">FIT: ${(p.fit * 100).toFixed(4)}%</span></div><div class="pair-row"><span>${p.a}</span><span>%${(p.wa * 100).toFixed(1)}</span></div><div class="pair-row"><span>${p.b}</span><span>%${(p.wb * 100).toFixed(1)}</span></div><div class="pair-row"><span>${p.c}</span><span>%${(p.wc * 100).toFixed(1)}</span></div></div>`).join('');
            document.getElementById('anc-tri-status').innerText = `${aTri.length} ANTİK ÜÇLÜ TARANDI`;

            // Otomatik akıllı scroll (Miras kartına doğru)
            let targetScroll = (CONFIG.zGap * 1.0) / CONFIG.camSpeed;
            let step = (targetScroll - lenis.scroll) / 25;
            function autoScroll() {
                if (Math.abs(lenis.scroll - targetScroll) > 5) {
                    lenis.scrollTo(lenis.scroll + step, { immediate: true });
                    requestAnimationFrame(autoScroll);
                }
            }
            autoScroll();
        }

        const lenis = new Lenis({ smooth: true, lerp: 0.08, direction: 'vertical', smoothTouch: true });
        lenis.on('scroll', ({ scroll, velocity }) => {
            const maxScroll = (CONFIG.itemCount - 1) * CONFIG.zGap / CONFIG.camSpeed;
            if (scroll > maxScroll) { lenis.scrollTo(maxScroll, { immediate: true }); state.scroll = maxScroll; }
            else { state.scroll = scroll; }
            state.targetSpeed = velocity;
        });

        let lastTime = 0;
        const feedbackVel = document.getElementById('vel-readout');
        const feedbackFPS = document.getElementById('fps');

        function raf(time) {
            lenis.raf(time);
            const delta = time - lastTime; lastTime = time;
            if (time % 10 < 1) feedbackFPS.innerText = Math.round(1000 / delta);
            state.velocity += (state.targetSpeed - state.velocity) * 0.1;
            feedbackVel.innerText = Math.abs(state.velocity).toFixed(2);
            document.getElementById('coord').innerText = `${state.scroll.toFixed(0)}`;
            document.getElementById('flagBg').style.opacity = Math.max(0, Math.min(1, (state.scroll - 4000) / 400));
            world.style.transform = `rotateX(${state.mouseY * 4 - state.velocity * 0.4}deg) rotateY(${state.mouseX * 4}deg)`;
            viewport.style.perspective = `${1100 - Math.min(Math.abs(state.velocity) * 8, 500)}px`;
            const cameraZ = state.scroll * CONFIG.camSpeed;
            items.forEach(item => {
                let vizZ = item.baseZ + cameraZ;
                let alpha = 1;
                if (vizZ < -2500) alpha = 0;
                else if (vizZ < -1500) alpha = (vizZ + 2500) / 1000;
                if (vizZ > 80 && item.type !== 'star') alpha = 1 - ((vizZ - 80) / 300);
                if (alpha < 0) alpha = 0;
                item.el.style.opacity = alpha;
                if (alpha > 0) {
                    let trans = `translate3d(${item.x}px, ${item.y}px, ${vizZ}px)`;
                    if (item.type !== 'star') { const t = time * 0.001; const float = Math.sin(t + vizZ * 0.01) * 4; trans += ` rotateY(${float}deg)`; }
                    item.el.style.transform = trans;
                }
            });
            requestAnimationFrame(raf);
        }
        init();
        requestAnimationFrame(raf);
    </script>
</body>
